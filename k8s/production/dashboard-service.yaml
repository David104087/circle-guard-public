---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-service-config
  namespace: circleguard-production
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/circleguard_dashboard"
  SPRING_DATASOURCE_USERNAME: "admin"
  CIRCLEGUARD_PROMOTION-SERVICE_URL: "http://promotion-service:8088"
  SERVER_PORT: "8084"
---
apiVersion: v1
kind: Secret
metadata:
  name: dashboard-service-secret
  namespace: circleguard-production
type: Opaque
stringData:
  SPRING_DATASOURCE_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: db-password
                  key: password
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
  namespace: circleguard-production
  labels:
    app: dashboard-service
    version: "latest"
    environment: production
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: dashboard-service
  template:
    metadata:
      labels:
        app: dashboard-service
    spec:
      containers:
        - name: dashboard-service
          image: davidartunduaga/circleguard-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: dashboard-service-config
            - secretRef:
                name: dashboard-service-secret
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: circleguard-production
spec:
  selector:
    app: dashboard-service
  ports:
    - port: 8084
      targetPort: 8084
