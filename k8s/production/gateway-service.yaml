---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-service-config
  namespace: circleguard-production
data:
  SPRING_DATA_REDIS_HOST: "redis"
  SPRING_DATA_REDIS_PORT: "6379"
  SERVER_PORT: "8087"
---
apiVersion: v1
kind: Secret
metadata:
  name: gateway-service-secret
  namespace: circleguard-production
type: Opaque
stringData:
  JWT_SECRET: "my-super-secret-dev-key-32-chars-long-12345678"
  QR_SECRET: "my-qr-secret-key-for-dev-1234567890"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: circleguard-production
  labels:
    app: gateway-service
    version: "latest"
    environment: production
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: davidartunduaga/circleguard-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8087
          envFrom:
            - configMapRef:
                name: gateway-service-config
            - secretRef:
                name: gateway-service-secret
          livenessProbe:
            tcpSocket:
              port: 8087
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: circleguard-production
spec:
  selector:
    app: gateway-service
  ports:
    - port: 8087
      targetPort: 8087
