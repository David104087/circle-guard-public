---
apiVersion: v1
kind: Secret
metadata:
  name: neo4j-secret
  namespace: circleguard-dev
type: Opaque
stringData:
  NEO4J_AUTH: neo4j/password
---
apiVersion: v1
kind: Secret
metadata:
  name: neo4j-secret
  namespace: circleguard-stage
type: Opaque
stringData:
  NEO4J_AUTH: neo4j/password
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: circleguard-dev
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.26
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          envFrom:
            - secretRef:
                name: neo4j-secret
          env:
            - name: NEO4J_dbms_connector_bolt_listen__address
              value: ":7687"
            - name: NEO4J_dbms_connector_bolt_advertised__address
              value: ":7687"
            - name: NEO4J_server_memory_heap_initial__size
              value: "256m"
            - name: NEO4J_server_memory_heap_max__size
              value: "256m"
            - name: NEO4J_server_memory_pagecache_size
              value: "128m"
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1"
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: circleguard-dev
spec:
  selector:
    app: neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: circleguard-stage
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.26
          ports:
            - containerPort: 7474
            - containerPort: 7687
          envFrom:
            - secretRef:
                name: neo4j-secret
          env:
            - name: NEO4J_server_memory_heap_initial__size
              value: "256m"
            - name: NEO4J_server_memory_heap_max__size
              value: "256m"
            - name: NEO4J_server_memory_pagecache_size
              value: "128m"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1"
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: circleguard-stage
spec:
  selector:
    app: neo4j
  ports:
    - name: http
      port: 7474
    - name: bolt
      port: 7687
  clusterIP: None
