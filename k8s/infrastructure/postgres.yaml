---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: circleguard-dev
type: Opaque
stringData:
  POSTGRES_USER: admin
  POSTGRES_PASSWORD: password
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: circleguard-stage
type: Opaque
stringData:
  POSTGRES_USER: admin
  POSTGRES_PASSWORD: password
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: circleguard-production
type: Opaque
stringData:
  POSTGRES_USER: admin
  POSTGRES_PASSWORD: changeme-in-prod
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: circleguard-dev
data:
  init.sh: |
    #!/bin/bash
    for db in circleguard_auth circleguard_dashboard circleguard_form circleguard_promotion circleguard_identity; do
      psql -U "$POSTGRES_USER" -tc "SELECT 1 FROM pg_database WHERE datname = '$db'" | grep -q 1 \
        || psql -U "$POSTGRES_USER" -c "CREATE DATABASE $db"
    done
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: circleguard-stage
data:
  init.sh: |
    #!/bin/bash
    for db in circleguard_auth circleguard_dashboard circleguard_form circleguard_promotion circleguard_identity; do
      psql -U "$POSTGRES_USER" -tc "SELECT 1 FROM pg_database WHERE datname = '$db'" | grep -q 1 \
        || psql -U "$POSTGRES_USER" -c "CREATE DATABASE $db"
    done
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: circleguard-production
data:
  init.sh: |
    #!/bin/bash
    for db in circleguard_auth circleguard_dashboard circleguard_form circleguard_promotion circleguard_identity; do
      psql -U "$POSTGRES_USER" -tc "SELECT 1 FROM pg_database WHERE datname = '$db'" | grep -q 1 \
        || psql -U "$POSTGRES_USER" -c "CREATE DATABASE $db"
    done
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: circleguard-dev
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          env:
            - name: POSTGRES_DB
              value: circleguard
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "96Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: circleguard-dev
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
