---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: circleguard-dev
type: Opaque
stringData:
  POSTGRES_USER: admin
  POSTGRES_PASSWORD: password
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: circleguard-stage
type: Opaque
stringData:
  POSTGRES_USER: admin
  POSTGRES_PASSWORD: password
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: circleguard-production
type: Opaque
stringData:
  POSTGRES_USER: admin
  POSTGRES_PASSWORD: changeme-in-prod
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: circleguard-dev
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS circleguard_auth;
    CREATE DATABASE IF NOT EXISTS circleguard_dashboard;
    CREATE DATABASE IF NOT EXISTS circleguard_form;
    CREATE DATABASE IF NOT EXISTS circleguard_promotion;
    CREATE DATABASE IF NOT EXISTS circleguard_identity;
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: circleguard-dev
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          env:
            - name: POSTGRES_DB
              value: circleguard
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: circleguard-dev
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
