---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: circleguard-dev
data:
  SPRING_KAFKA_BOOTSTRAP-SERVERS: "kafka:9092"
  SPRING_MAIL_HOST: "mailhog"
  SPRING_MAIL_PORT: "1025"
  AUTH_API_URL: "http://auth-service:8180"
  SERVER_PORT: "8082"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: circleguard-dev
  labels:
    app: notification-service
    version: "latest"
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: davidartunduaga/circleguard-notification:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: notification-service-config
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: circleguard-dev
spec:
  selector:
    app: notification-service
  ports:
    - port: 8082
      targetPort: 8082
