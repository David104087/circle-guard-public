---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: circleguard-dev
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/circleguard_auth"
  SPRING_DATASOURCE_USERNAME: "admin"
  SPRING_LDAP_URLS: "ldap://openldap:389"
  SPRING_LDAP_BASE: "dc=circleguard,dc=edu"
  SPRING_LDAP_USERNAME: "cn=admin,dc=circleguard,dc=edu"
  IDENTITY_SERVICE_URL: "http://identity-service:8083"
  SERVER_PORT: "8180"
  MANAGEMENT_HEALTH_LDAP_ENABLED: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: circleguard-dev
type: Opaque
stringData:
  SPRING_DATASOURCE_PASSWORD: "password"
  SPRING_LDAP_PASSWORD: "admin"
  JWT_SECRET: "my-super-secret-dev-key-32-chars-long-12345678"
  QR_SECRET: "my-qr-secret-key-for-dev-1234567890"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: circleguard-dev
  labels:
    app: auth-service
    version: "latest"
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: davidartunduaga/circleguard-auth:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8180
          envFrom:
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: auth-service-secret
          livenessProbe:
            tcpSocket:
              port: 8180
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8180
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: circleguard-dev
spec:
  selector:
    app: auth-service
  ports:
    - port: 8180
      targetPort: 8180
