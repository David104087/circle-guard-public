---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-service
  namespace: circleguard-dev
  labels:
    app: file-service
    version: "latest"
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: file-service
  template:
    metadata:
      labels:
        app: file-service
    spec:
      containers:
        - name: file-service
          image: davidartunduaga/circleguard-file:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8085
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            initialDelaySeconds: 45
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          env:
            - name: SERVER_PORT
              value: "8085"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: uploads
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: file-service
  namespace: circleguard-dev
spec:
  selector:
    app: file-service
  ports:
    - port: 8085
      targetPort: 8085
