---
apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-service-config
  namespace: circleguard-dev
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/circleguard_identity"
  SPRING_DATASOURCE_USERNAME: "admin"
  SERVER_PORT: "8083"
---
apiVersion: v1
kind: Secret
metadata:
  name: identity-service-secret
  namespace: circleguard-dev
type: Opaque
stringData:
  SPRING_DATASOURCE_PASSWORD: "password"
  JWT_SECRET: "my-super-secret-dev-key-32-chars-long-12345678"
  VAULT_SECRET: "746573742d7365637265742d33322d63686172732d6c6f6e672d313233343536"
  VAULT_SALT: "deadbeef"
  VAULT_HASH_SALT: "12345678"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: circleguard-dev
  labels:
    app: identity-service
    version: "latest"
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: davidartunduaga/circleguard-identity:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: identity-service-config
            - secretRef:
                name: identity-service-secret
          livenessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: circleguard-dev
spec:
  selector:
    app: identity-service
  ports:
    - port: 8083
      targetPort: 8083
