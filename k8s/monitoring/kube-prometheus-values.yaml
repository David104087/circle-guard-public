## kube-prometheus-stack Helm values for CircleGuard
## Install: helm upgrade --install kube-prometheus kube-prometheus-stack/kube-prometheus-stack \
##           -n monitoring --create-namespace -f k8s/monitoring/kube-prometheus-values.yaml

grafana:
  enabled: true
  adminPassword: "CircleGuardGrafana2024"
  service:
    type: ClusterIP
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/grafana"

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard-rwo
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: standard-rwo
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: slack
    receivers:
      - name: slack
        slack_configs:
          - api_url: "SLACK_WEBHOOK_PLACEHOLDER"
            channel: "#circleguard-alerts"
            send_resolved: true
            title: '{{ template "slack.default.title" . }}'
            text: '{{ template "slack.default.text" . }}'

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
