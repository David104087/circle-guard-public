apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: circleguard-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus
spec:
  groups:
    - name: circleguard.pods
      interval: 30s
      rules:
        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total{namespace=~"circleguard-.*"}[15m]) > 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} restarted {{ $value }} times in 15 minutes."

        - alert: PodNotReady
          expr: kube_pod_status_ready{condition="false",namespace=~"circleguard-.*"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is not ready"
            description: "Pod {{ $labels.pod }} has been not ready for more than 5 minutes."

    - name: circleguard.latency
      interval: 30s
      rules:
        - alert: HighP95Latency
          expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{namespace=~"circleguard-.*"}[5m])) by (le, service)) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High p95 latency on {{ $labels.service }}"
            description: "p95 latency is {{ $value }}s (>1s threshold) on service {{ $labels.service }}."

    - name: circleguard.errors
      interval: 30s
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(http_server_requests_seconds_count{namespace=~"circleguard-.*",status=~"5.."}[5m])) by (service)
            /
            sum(rate(http_server_requests_seconds_count{namespace=~"circleguard-.*"}[5m])) by (service)
            > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High error rate on {{ $labels.service }}"
            description: "Error rate is {{ $value | humanizePercentage }} (>5%) on {{ $labels.service }}."

    - name: circleguard.jvm
      interval: 60s
      rules:
        - alert: JvmHeapHigh
          expr: |
            sum(jvm_memory_used_bytes{namespace=~"circleguard-.*",area="heap"}) by (pod)
            /
            sum(jvm_memory_max_bytes{namespace=~"circleguard-.*",area="heap"}) by (pod)
            > 0.9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "JVM heap >90% on {{ $labels.pod }}"
            description: "JVM heap usage is {{ $value | humanizePercentage }} on pod {{ $labels.pod }}."

    - name: circleguard.storage
      interval: 5m
      rules:
        - alert: PvcAlmostFull
          expr: |
            (kubelet_volume_stats_used_bytes{namespace=~"circleguard-.*"}
            / kubelet_volume_stats_capacity_bytes{namespace=~"circleguard-.*"}) > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} is 85%+ full"
            description: "PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full in namespace {{ $labels.namespace }}."
