# VirtualServices for all CircleGuard services.
# Configures: retry policies on idempotent operations (GET), timeout, and traffic routing.
# auth-service includes v1/v2 subsets for canary deployments (Task 3.10).
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: auth-service
  namespace: circleguard-stage
spec:
  hosts:
    - auth-service
  http:
    - match:
        - method:
            exact: GET
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,gateway-error,connect-failure,retriable-4xx
      route:
        - destination:
            host: auth-service
            subset: v1
          weight: 100
        - destination:
            host: auth-service
            subset: v1
          weight: 0
    - route:
        - destination:
            host: auth-service
            subset: v1
          weight: 100
