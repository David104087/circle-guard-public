---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-service
  namespace: circleguard-stage
  labels:
    app: file-service
    version: "latest"
    environment: stage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: file-service
  template:
    metadata:
      labels:
        app: file-service
    spec:
      containers:
        - name: file-service
          image: davidartunduaga/circleguard-file:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8085
          env:
            - name: SERVER_PORT
              value: "8085"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: uploads
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: file-service
  namespace: circleguard-stage
spec:
  selector:
    app: file-service
  ports:
    - port: 8085
      targetPort: 8085
