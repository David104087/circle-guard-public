---
apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-service-config
  namespace: circleguard-stage
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/circleguard_identity"
  SPRING_DATASOURCE_USERNAME: "admin"
  SERVER_PORT: "8083"
---
apiVersion: v1
kind: Secret
metadata:
  name: identity-service-secret
  namespace: circleguard-stage
type: Opaque
stringData:
  SPRING_DATASOURCE_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: db-password
                  key: password
  JWT_SECRET:
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
  VAULT_SECRET:
              valueFrom:
                secretKeyRef:
                  name: vault-secret
                  key: secret
  VAULT_SALT: "deadbeef"
  VAULT_HASH_SALT: "12345678"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: circleguard-stage
  labels:
    app: identity-service
    version: "latest"
    environment: stage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: davidartunduaga/circleguard-identity:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: identity-service-config
            - secretRef:
                name: identity-service-secret
          livenessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: circleguard-stage
spec:
  selector:
    app: identity-service
  ports:
    - port: 8083
      targetPort: 8083
